name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: fqdn-networkpolicy-operator

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        configuration: [debug, release]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --no-restore -c ${{ matrix.configuration }}

      - name: Build container image
        if: matrix.configuration == 'release'
        run: |
          dotnet publish src/Operator/Operator.csproj \
            --os linux --arch x64 \
            -c Release \
            /t:PublishContainer \
            -p:ContainerArchiveOutputPath=${{ github.workspace }}/artifacts/container/${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload test binaries
        uses: actions/upload-artifact@v6
        with:
          name: test-binaries-${{ matrix.configuration }}
          path: artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/
          retention-days: 1

      - name: Upload operator config
        if: matrix.configuration == 'release'
        uses: actions/upload-artifact@v6
        with:
          name: operator-config
          path: src/Operator/config/
          retention-days: 1

      - name: Upload container image
        if: matrix.configuration == 'release'
        uses: actions/upload-artifact@v6
        with:
          name: container-image
          path: artifacts/container/${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        configuration: [debug, release]

    steps:
      - uses: actions/checkout@v6

      - name: Download test binaries
        uses: actions/download-artifact@v7
        with:
          name: test-binaries-${{ matrix.configuration }}
          path: artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/

      - name: Download operator config
        uses: actions/download-artifact@v7
        with:
          name: operator-config
          path: src/Operator/config/

      - name: Setup minikube
        uses: medyagh/setup-minikube@v0.0.21

      - name: Run integration tests
        run: |
          chmod +x ./artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/Operator.IntegrationTests
          ./artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/Operator.IntegrationTests

  docker-push:
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download container image
        uses: actions/download-artifact@v7
        with:
          name: container-image

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.AZURE_ACR_LOGIN_SERVER }}

      - name: Load and push container image
        run: |
          docker load -i ${{ env.IMAGE_NAME }}.tar.gz
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
