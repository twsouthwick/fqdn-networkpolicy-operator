name: CI

on:
  push:
    branches: [main]
    tags-ignore:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: fqdn-networkpolicy-operator

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint Helm chart
        run: helm lint charts/fqdn-networkpolicy-operator

  build:
    runs-on: ubuntu-latest
    needs: [version, lint]

    strategy:
      matrix:
        configuration: [debug, release]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --no-restore -c ${{ matrix.configuration }} -p:Version=${{ needs.version.outputs.semVer }}

      - name: Build container image
        if: matrix.configuration == 'release'
        run: |
          dotnet publish src/Operator/Operator.csproj \
            --os linux --arch x64 \
            -c Release \
            /t:PublishContainer \
            -p:Version=${{ needs.version.outputs.semVer }} \
            -p:ContainerImageTag=${{ needs.version.outputs.semVer }} \
            -p:ContainerArchiveOutputPath=${{ github.workspace }}/artifacts/container/${{ env.IMAGE_NAME }}.tar.gz

      - name: Cache test binaries
        uses: actions/cache/save@v4
        with:
          key: test-binaries-${{ matrix.configuration }}-${{ github.run_id }}
          path: artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/

      - name: Cache operator config
        if: matrix.configuration == 'release'
        uses: actions/cache/save@v4
        with:
          key: operator-config-${{ github.run_id }}
          path: artifacts/k8s/

      - name: Cache container image
        if: matrix.configuration == 'release'
        uses: actions/cache/save@v4
        with:
          key: container-image-${{ github.run_id }}
          path: artifacts/container/${{ env.IMAGE_NAME }}.tar.gz

  integration-tests:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        configuration: [debug, release]

    steps:
      - uses: actions/checkout@v6

      - name: Restore test binaries
        uses: actions/cache/restore@v4
        with:
          key: test-binaries-${{ matrix.configuration }}-${{ github.run_id }}
          path: artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/
          fail-on-cache-miss: true

      - name: Restore operator config
        uses: actions/cache/restore@v4
        with:
          key: operator-config-${{ github.run_id }}
          path: artifacts/k8s/
          fail-on-cache-miss: true

      - name: Setup kind
        uses: helm/kind-action@v1

      - name: Run integration tests
        run: |
          chmod +x ./artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/Operator.IntegrationTests
          ./artifacts/bin/Operator.IntegrationTests/${{ matrix.configuration }}/Operator.IntegrationTests

  docker-push:
    runs-on: ubuntu-latest
    needs: [build, integration-tests, version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Restore container image
        uses: actions/cache/restore@v4
        with:
          key: container-image-${{ github.run_id }}
          path: artifacts/container/${{ env.IMAGE_NAME }}.tar.gz
          fail-on-cache-miss: true

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Load and push container image
        run: |
          docker load -i artifacts/container/${{ env.IMAGE_NAME }}.tar.gz
          docker tag ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.semVer }} ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.semVer }}
          docker tag ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.semVer }} ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.semVer }} ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.semVer }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
