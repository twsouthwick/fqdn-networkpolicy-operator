name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  IMAGE_NAME: fqdn-networkpolicy-operator

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Resolve version
        id: version
        run: |
          echo "version=${{ steps.gitversion.outputs.semVer }}" >> $GITHUB_OUTPUT
          echo "Building version: ${{ steps.gitversion.outputs.semVer }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Build container image
        run: |
          dotnet publish src/Operator/Operator.csproj \
            --os linux --arch x64 \
            -c Release \
            /t:PublishContainer \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:ContainerImageTag=${{ steps.version.outputs.version }} \
            -p:ContainerArchiveOutputPath=${{ github.workspace }}/artifacts/container/${{ env.IMAGE_NAME }}.tar.gz

      - name: Upload container image
        uses: actions/upload-artifact@v6
        with:
          name: container-image
          path: artifacts/container/${{ env.IMAGE_NAME }}.tar.gz
          retention-days: 1

    outputs:
      version: ${{ steps.version.outputs.version }}

  docker-push:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download container image
        uses: actions/download-artifact@v7
        with:
          name: container-image

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.AZURE_ACR_LOGIN_SERVER }}

      - name: Load and push container image
        run: |
          docker load -i ${{ env.IMAGE_NAME }}.tar.gz
          docker tag ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }} ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
          docker tag ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }} ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }} ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}
          docker push ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  github-release:
    runs-on: ubuntu-latest
    needs: [build, docker-push]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}

  helm-publish:
    runs-on: ubuntu-latest
    needs: [build, docker-push]

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Copy CRD into chart
        run: |
          mkdir -p charts/fqdn-networkpolicy-operator/crds
          cp artifacts/k8s/fqdnnetworkpolicies_fqdnnetpol_swick_dev.yaml \
            charts/fqdn-networkpolicy-operator/crds/

      - name: Package Helm chart
        run: |
          helm package charts/fqdn-networkpolicy-operator \
            --version ${{ needs.build.outputs.version }} \
            --app-version ${{ needs.build.outputs.version }}

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push Helm chart
        run: helm push fqdn-networkpolicy-operator-${{ needs.build.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
