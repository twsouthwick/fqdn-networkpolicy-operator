apiVersion: apps/v1
kind: Deployment
metadata:
  name: fqdn-provider
  namespace: default
  labels:
    app: fqdn-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fqdn-provider
  template:
    metadata:
      labels:
        app: fqdn-provider
    spec:
      containers:
        - name: fqdn-provider
          image: fqdn-provider:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 7942
---
apiVersion: v1
kind: Service
metadata:
  name: fqdn-provider
  namespace: default
spec:
  selector:
    app: fqdn-provider
  ports:
    - port: 7942
      targetPort: 7942
---
# FqdnNetworkPolicy CR that points the operator at this service
apiVersion: fqdnnetpol.swick.dev/v1alpha1
kind: FqdnNetworkPolicy
metadata:
  name: fqdn-provider
  namespace: default
spec:
  egress:
    - domains:
        - example.com
        - api.example.com
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
    - externalProvider:
        serviceName: fqdn-provider
        port: 7942
        path: /addresses
  policy:
    podSelector: {}
    policyTypes:
      - Egress
